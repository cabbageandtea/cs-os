name: Launch Gate

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target URL for launch gate checks"
        required: true
        default: "https://doggybagg.cc"

jobs:
  launch-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    concurrency:
      group: launch-gate-${{ github.event_name }}
      cancel-in-progress: true
    env:
      BASE_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_url || 'https://doggybagg.cc' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate claims source of truth
        run: python scripts/validate_claims_matrix.py

      - name: Run launch gate
        shell: bash
        run: |
          set -euo pipefail
          python scripts/launch_gate.py "$BASE_URL" | tee launch-gate.log

      - name: Upload launch gate log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: launch-gate-log
          path: launch-gate.log
