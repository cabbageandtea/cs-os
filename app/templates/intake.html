{% extends "base.html" %}
{% block title %}Intake — CS-OS{% endblock %}
{% block content %}
<h1>Client Intake</h1>
<p class="meta">Structured fields only. Vague or empty sections are rejected.</p>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
  <form method="post" action="/intake">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required>

    <label for="target_role">Target Role (explicit job title)</label>
    <input type="text" id="target_role" name="target_role" placeholder="Software Engineer Intern" required minlength="3">

    <label for="package_tier">Package Tier</label>
    <select id="package_tier" name="package_tier">
      <option value="Basic">Basic ($99)</option>
      <option value="Standard">Standard ($199)</option>
      <option value="Premium">Premium ($299–399)</option>
    </select>

    <label for="experience_education">Education</label>
    <textarea id="experience_education" name="experience_education" placeholder="School, degree, graduation year, relevant coursework..." required minlength="10"></textarea>

    <label for="experience_projects">Projects</label>
    <textarea id="experience_projects" name="experience_projects" placeholder="Project name, stack, outcome, measurable impact..." required minlength="10"></textarea>

    <label for="experience_work">Work / Internships</label>
    <textarea id="experience_work" name="experience_work" placeholder="Company, role, dates, responsibilities, results..." required minlength="10"></textarea>

    <label for="skills">Skills (comma-separated)</label>
    <input type="text" id="skills" name="skills" placeholder="Python, React, SQL" required>

    <label for="linkedin_url">LinkedIn URL</label>
    <input type="url" id="linkedin_url" name="linkedin_url" placeholder="https://linkedin.com/in/...">

    <label for="github_url">GitHub URL</label>
    <input type="url" id="github_url" name="github_url" placeholder="https://github.com/...">

    <button type="submit">Create Client + Project</button>
  </form>
</div>
{% endblock %}
