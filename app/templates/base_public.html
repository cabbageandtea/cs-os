<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="{% block meta_description %}{{ site_meta_description }}{% endblock %}">

  <meta name="robots" content="{% block robots %}index, follow{% endblock %}">

  <meta name="google-site-verification" content="oiiraz1vOS10Iv2KrT3SYn2HGviOUy93-xknwyrslk4">

  <link rel="canonical" href="{% block canonical_url %}{{ site_base_url }}{{ request.url.path }}{% endblock %}">

  <title>{% block title %}{{ site_name }} — {{ site_tagline }}{% endblock %}</title>

  <meta property="og:type" content="website">

  <meta property="og:site_name" content="{{ site_name }}">

  <meta property="og:title" content="{% block og_title %}{{ site_name }} — {{ site_tagline }}{% endblock %}">

  <meta property="og:description" content="{% block og_description %}{{ site_meta_description }}{% endblock %}">

  <meta property="og:url" content="{% block og_url %}{{ site_base_url }}{{ request.url.path }}{% endblock %}">

  <meta property="og:image" content="{{ site_og_image_url }}">

  <meta property="og:image:width" content="1024">

  <meta property="og:image:height" content="1024">

  <meta property="og:image:alt" content="{{ site_name }} — {{ site_tagline }}">

  <meta name="twitter:card" content="summary_large_image">

  <meta name="twitter:title" content="{% block twitter_title %}{{ site_name }} — {{ site_tagline }}{% endblock %}">

  <meta name="twitter:description" content="{% block twitter_description %}{{ site_meta_description }}{% endblock %}">

  <meta name="twitter:image" content="{{ site_og_image_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400..700&display=swap" rel="stylesheet">

  <link rel="icon" href="/static/logo-icon.png?v=4" type="image/png">

  <meta name="theme-color" content="#141418">

  <link rel="apple-touch-icon" href="/static/logo-icon.png?v=4">

  <link rel="stylesheet" href="/static/public.css?v=8">

</head>

<body class="page-public {% block body_class %}{% endblock %}">

  <header class="public-header">

    <a href="/" class="brand" aria-label="{{ site_name }} — home">

      <img src="/static/logo-icon.png?v=5" alt="{{ site_name }}" class="brand-mark brand-mark--icon" width="48" height="48" decoding="async">
      <span class="brand-name">{{ site_name }}</span>

    </a>

    <nav>

      <a href="/#examples">Portfolio</a>
      <a href="/#why-me">Why .me</a>
      <a href="/#packages">Packages</a>

      <a href="/demo">Process</a>

      <a href="/contact">Contact</a>

      <a href="/checkout" class="nav-cta">Begin</a>

    </nav>

  </header>

  <main>

    {% block content %}{% endblock %}

  </main>

  <footer class="public-footer">

    <p class="meta"><a href="/contact">Contact</a> · <a href="mailto:{{ support_email }}">{{ support_email }}</a> · <a href="/start">Client guide</a> · <a href="/status">Status</a> · <a href="/terms">Terms</a> · <a href="/privacy">Privacy</a></p>

  </footer>

  <script src="/static/public.js?v=2" defer></script>

</body>

</html>
